<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NODAY'Z ENTERTAINMENT</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="./images/nodaylogo.png"> <!-- Favicon -->
</head>
<body>
  <!-- Header Section -->
  <header class="menu">
    <img id="logoimg" src="./images/nodaylogo.png" alt="Logo" class="menu-logo">
    <h1>NODAY'Z ENTERTAINMENT</h1>
    <nav>
      <ul>
        <li><a href="#">Events</a>
          <ul class="dropdown">
            <li><a href="#">Upcoming Events</a></li>
            <li><a href="#">Past Events</a></li>
          </ul>
        </li>
        <li><a href="#">Sound</a>
          <ul class="dropdown">
            <li><a href="#">Playlists</a></li>
            <li><a href="#">Live Sessions</a></li>
          </ul>
        </li>
        <li><a href="#">Festivals</a>
          <ul class="dropdown">
            <li><a href="#">2024 Highlights</a></li>
            <li><a href="#">Photos</a></li>
          </ul>
        </li>
      </ul>
    </nav>
  </header>

  <!-- Main Content -->
  <div class="container">
    <section class="genres" id="genres-section">
      <div class="genre" onclick="openGenre('karaoke')"> KARAOKE @ CAFE AMKA <img id="amkalogo2"src="./images/amkabglogo.png" alt="Karaoke Logo" class="karaoke-logo hidden"></div>
      <div class="genre" onclick="openGenre('mixxez')">MIXXEZ</div>
      <div class="genre" onclick="openGenre('live')">LIVE</div>
    </section>

    <div id="qr-back-container">
      <button id="back-button" onclick="goBack()" class="hidden">⬅ Back</button>
      <img id="qr" src="./images/qr.png" alt="Scan to Access Music Site">
    </div>
  </div>

  <!-- Genre Content Display -->
  <section id="genre-content" class="genre-content hidden">
    <h3 id="genre-title"> Enjoy: </h3>
    <ul id="music-list"></ul>
  </section>

  <!-- Media Player -->
  <div id="media-player" class="media-player hidden">
    <button id="close-button" onclick="closePlayer()">✖</button>
    <video id="video-player" controls class="hidden" onended="closePlayer()"></video>
    <audio id="audio-player" controls class="hidden"></audio>
  </div>

  <script src="script.js"></script>
</body>
</html>
