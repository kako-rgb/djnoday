<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NODAY'Z ENTERTAINMENT</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="./images/nodaylogo.png"> <!-- Favicon -->
</head>
<body>
  <!-- Header Section -->
  <header class="menu">
    <img id="logoimg" src="./images/nodaylogo.png" alt="Logo" class="menu-logo">
    <h1>NODAY'Z ENTERTAINMENT</h1>
    <nav>
      <ul>
        <li><a href="#">Events</a></li>
      </ul>
    </nav>
  </header>
  <div class="search-box">
    <input type="text" placeholder="Search..." id="search-input">
    <button onclick="performSearch()">🔍</button>
  </div>
  
  <!-- Main Content -->
  <div class="container">
    <section class="genres" id="genres-section">
      <div id="kcont"> KARAOKE @ CAFE AMKA <img id="amkalogo2"src="./images/amkabglogo.png" alt="Karaoke Logo" class="karaoke-logo hidden">
        <div class="container1">
                    <div class="content1">
            <aside class="categories1">
              <h2 id="kwanza">Genre</h2>
              <ul id="category-list">
                <li data-category="arabic">Arabic</li>
          <li data-category="chinese">Chinese</li>
          <li data-category="dancehall">Dancehall,Ragga,Riddims</li>
          <li data-category="eastAfrican">East African</li>
          <li data-category="gospel">gospel</li>
          <li data-category="international">International</li>
          <li data-category="lingala">Lingala & Rhumba</li>
          <li data-category="roots">Reggae & Roots</li>
          <li data-category="traditional">Traditional</li>
          <li data-category="naija">West & South Africa</li>
          <li data-category="xmass">Xmass</li>
              </ul>
            </aside>
            <main class="details">
              <h2 id="details-title">Select a Song</h2>
              <ul id="item-list" class="item-list"></ul>
            </main>
          </div>
        </div>
        </div>
      <div id="mixcont" class="genre" onclick="openGenre('mixxez')">MIXXEZ</div>
      <div id="livecont" class="genre" onclick="openGenre('live')">LIVE</div>
    </section>

    <div id="qr-back-container">
      <button id="back-button" onclick="goBack()" class="hidden">⬅ Back</button>
      <img id="qr" src="./images/qr.png" alt="Scan to Access Music Site">
    </div>
  </div>

  <!-- Genre Content Display -->
  <section id="genre-content" class="genre-content hidden">
    <h3 id="genre-title"> Enjoy: </h3>
    <ul id="music-list"></ul>
  </section>

  <!-- Media Player -->
  <div id="media-player" class="media-player hidden">
    <button id="close-button" onclick="closePlayer()">✖</button>
    <video id="video-player" controls class="hidden" onended="closePlayer()"></video>
    <audio id="audio-player" controls class="hidden"></audio>
  </div>

  <script src="script.js"></script>
</body>
</html>
