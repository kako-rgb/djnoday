<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Genre Website</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Navigation Menu -->
  <header class="menu">
    <h1>NODAYZ ENTERTAINMENT</h1>
    <nav>
      <ul>
        <li><a href="#" onclick="openGenre('nightclubs')"> Nightclubs </a></li>
        <li><a href="#" onclick="openGenre('sound')">Sound</a></li>
        <li><a href="#" onclick="openGenre('festivals')">Festivals</a></li>
      </ul>
    </nav>
  </header>
  
  <img id="qr" src="./images/qrnobg.png" alt="Scan to Access Music Site">

  <!-- Genre Selection Section -->
  <section class="genres">
    <h2>Select a Genre</h2>
    <div class="genre" onclick="openGenre('karaoke')">KARAOKE@CAFEAMKA</div>
    <div class="genre" onclick="openGenre('mixxez')">MIXXEZ</div>
    <div class="genre" onclick="openGenre('live')">LIVE</div>
  </section>

  <!-- Genre Content Display -->
  <section id="genre-content" class="genre-content hidden">
    <h3 id="genre-title">Genre: </h3>
    <div id="loading" class="loading hidden">Loading music...</div>
    <ul id="music-list"></ul>
  </section>

 <!-- Media Player (Video or Audio) -->
<div id="media-player" class="media-player hidden">
  <video id="video-player" controls class="hidden"></video>
  <audio id="audio-player" controls class="hidden"></audio>
  <button onclick="toggleFullScreen()">Toggle Full Screen</button>
  <button onclick="closePlayer()">Exit Player</button>
</div>


  <!-- JavaScript -->
  <script src="script.js"></script>
</body>
</html>
